apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deploy        # 서비스별로 고유하게 설정 (product-deploy 등)
  labels:
    app: product              # 서비스 식별용 레이블
spec:
  replicas: 1              # 초기 배포 시 복제본 수
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product-container
        # ECR 주소는 kustomization.yaml에서 관리하므로 여기선 기본값 유지
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/sallijang-backend-product:latest
        ports:
        - containerPort: 8080 # Python 앱이 사용하는 포트 (Dockerfile 확인 필요)
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"