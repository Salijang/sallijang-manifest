apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-deploy
  labels:
    app: notify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notify
  template:
    metadata:
      labels:
        app: notify
    spec:
      serviceAccountName: sallijang-notify-sa
      containers:
      - name: notify-container
        image: notify-image
        ports:
        - containerPort: 8003
        env:
        - name: DB_HOST
          value: "pickup-dev-rds-proxy.proxy-c1ckoyqwsimf.ap-northeast-2.rds.amazonaws.com"
        - name: DB_USER
          value: "adminuser"
        - name: DB_NAME
          value: "pickupdb"
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: ORDER_SERVICE_URL
          value: "http://order-service"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"