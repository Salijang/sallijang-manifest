apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deploy
  labels:
    app: order
spec:
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      serviceAccountName: sallijang-order-sa
      containers:
      - name: order-container
        image: order-image
        ports:
        - containerPort: 8002
        env:
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: DB_POOL_SIZE
          value: "3"
        - name: DB_MAX_OVERFLOW
          value: "2"
        - name: DB_POOL_TIMEOUT
          value: "3"
        - name: ORDER_SLOW_LOG_MS
          value: "1000"
        - name: DB_HOST
          value: "pickup-prod-rds-proxy.proxy-c1ckoyqwsimf.ap-northeast-2.rds.amazonaws.com"
        - name: DB_USER
          value: "adminuser"
        - name: DB_NAME
          value: "pickupdb"
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: user-service-secret
              key: secret-key
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service"
        - name: REDIS_URL
          value: "rediss://master.pickup-prod-redis.n5yr9i.apn2.cache.amazonaws.com:6379"
        - name: SQS_QUEUE_URL
          value: "https://sqs.ap-northeast-2.amazonaws.com/594486941613/pickup-prod-reservation"
        - name: STOCK_DEDUCT_QUEUE_URL
          value: "https://sqs.ap-northeast-2.amazonaws.com/594486941613/pickup-prod-stock-deduct"
        - name: STOCK_RESULT_QUEUE_URL
          value: "https://sqs.ap-northeast-2.amazonaws.com/594486941613/pickup-prod-stock-result"
        command: ["sh", "-c"]
        args:
        - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8002 --loop asyncio --http h11
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
