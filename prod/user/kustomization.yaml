apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base/user

patches:
- patch: |-
    - op: replace
      path: /metadata/annotations/eks.amazonaws.com~1role-arn
      value: "arn:aws:iam::594486941613:role/pickup-prod-user-sa-role"
  target:
    kind: ServiceAccount
    name: sallijang-user-sa

patchesStrategicMerge:
- patch-deployment.yaml
